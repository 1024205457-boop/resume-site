<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRW Pipeline Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #e2e8f0; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .terminal { width: min(720px, 100%); background: #1e293b; border-radius: 12px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,.4); }
    .bar { background: #334155; padding: .75rem 1rem; display: flex; gap: .5rem; }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .red { background: #ef4444; } .yellow { background: #eab308; } .green { background: #22c55e; }
    .screen { padding: 1.25rem; min-height: 360px; font-size: .9rem; line-height: 1.7; }
    .line { opacity: 0; animation: fadeIn .4s forwards; }
    .prompt { color: #22c55e; } .cmd { color: #93c5fd; } .out { color: #cbd5e1; } .hi { color: #fbbf24; }
    @keyframes fadeIn { to { opacity: 1; } }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="bar"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
    <div class="screen" id="screen"></div>
  </div>
  <script>
    const lines = [
      ['prompt', '$ ', './demo.sh'],
      ['out', '', '=== MRW 市场咨询 AI 工作流 Demo ==='],
      ['out', '', '[1/3] 展示 Brief...'],
      ['out', '', 'title: 敏感肌护肤品类消费者洞察'],
      ['out', '', '[2/3] 运行 Pipeline...'],
      ['out', '', 'Pipeline complete.'],
      ['hi', '', '  Source rate:  100.0%'],
      ['hi', '', '  Auto-passed:  14/14'],
      ['out', '', '[3/3] 运行 MOS 评测...'],
      ['hi', '', '  Average MOS:  3.94'],
      ['hi', '', '  Pass rate:    100.0%'],
      ['out', '', '=== Demo 完成 ==='],
      ['out', '', 'Report → outputs/report.html'],
    ];
    const screen = document.getElementById('screen');
    let i = 0;
    function showNext() {
      if (i >= lines.length) return;
      const [cls, prefix, text] = lines[i++];
      const div = document.createElement('div');
      div.className = 'line ' + cls;
      div.style.animationDelay = '0s';
      div.textContent = prefix + text;
      screen.appendChild(div);
      setTimeout(showNext, i === 1 ? 400 : 700);
    }
    showNext();
  </script>
</body>
</html>
